<!DOCTYPE html>
<html>
    <head>
        <title>formulario de registros</title>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="estilo.css"/>
    </head>
    <body>
        <div class="container">
            <img class="imagen-logo" src="logo.png"/><!--aqui se carga el logo, debe ser nomrado de igual forma que en el progama-->
            <div>
                <h1>formulario de registro</h1>
                <form class="formulario">
                    <input type="text" placeholder="nombre y apellido"/><br/>
                    <input type="email" placeholder="correo electronico"/><br/>
                    <input type="number" placeholder="telefon"/><br/>
                    <label>fecha de nacimiento</label><br/>
                    <input type="date" placeholder="fecha de nacimiento"/><br/>
                    <button>enviar</button><br/>
                </form>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
