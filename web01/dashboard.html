<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition duration-200 ease-in-out w-64 bg-gray-900 text-white p-6 z-50">

        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Dashboard</h2>
            <button onclick="toggleMenu()" class="md:hidden text-white text-xl">✕</button>
        </div>

        <nav class="space-y-4">
            <a href="#" class="block hover:bg-gray-700 p-2 rounded">Inicio</a>
            <a href="#" class="block hover:bg-gray-700 p-2 rounded">Usuarios</a>
            <a href="#" class="block hover:bg-gray-700 p-2 rounded">Reportes</a>
            <a href="#" class="block hover:bg-gray-700 p-2 rounded">Configuración</a>
        </nav>
    </aside>

    <!-- Overlay -->
    <div id="overlay" onclick="toggleMenu()"
        class="fixed inset-0 bg-black bg-opacity-50 hidden md:hidden z-40"></div>

    <!-- Contenido -->
    <div class="flex-1 flex flex-col w-full">

        <!-- Navbar -->
        <header class="bg-white shadow p-4 flex justify-between items-center">
            <button onclick="toggleMenu()" class="md:hidden bg-gray-900 text-white px-4 py-2 rounded">
                ☰ Menú
            </button>
            <h1 class="text-xl font-bold">Panel de Control</h1>
        </header>

        <!-- Main -->
        <main class="p-6 overflow-y-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

                <div class="bg-white p-6 rounded shadow">
                    <h3 class="text-gray-500">Usuarios</h3>
                    <p class="text-2xl font-bold">1,250</p>
                </div>

                <div class="bg-white p-6 rounded shadow">
                    <h3 class="text-gray-500">Ventas</h3>
                    <p class="text-2xl font-bold">$8,540</p>
                </div>

                <div class="bg-white p-6 rounded shadow">
                    <h3 class="text-gray-500">Pedidos</h3>
                    <p class="text-2xl font-bold">320</p>
                </div>

                <div class="bg-white p-6 rounded shadow">
                    <h3 class="text-gray-500">Ingresos</h3>
                    <p class="text-2xl font-bold">$12,300</p>
                </div>

            </div>
        </main>

    </div>
</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}
</script>

</body>
</html>
